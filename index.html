
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,'system-ui');background:transparent}
.app{max-width:680px;margin:0 auto;padding:0 0.5rem 4rem;font-size:14px}

.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--color-border-tertiary);margin-bottom:1.25rem;margin-top:1rem}
.tab-btn{padding:10px 18px;font-size:13px;font-weight:500;color:var(--color-text-secondary);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;display:flex;align-items:center;gap:6px;transition:color .15s}
.tab-btn i{font-size:15px}
.tab-btn:hover{color:var(--color-text-primary)}
.tab-btn.active{color:#1D9E75;border-bottom-color:#1D9E75}

.tab-pane{display:none}
.tab-pane.active{display:block}

.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:1.25rem;background:var(--color-background-secondary);border-radius:10px;padding:10px 14px}
.prog-label{font-size:12px;color:var(--color-text-secondary);white-space:nowrap}
.prog-bar{flex:1;height:6px;background:var(--color-background-tertiary);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width .4s}
.prog-num{font-size:12px;font-weight:500;color:#0F6E56;white-space:nowrap}

.color-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;padding:8px 12px;background:var(--color-background-secondary);border-radius:10px;border:0.5px solid var(--color-border-tertiary)}
.legend-title{font-size:11px;color:var(--color-text-secondary);width:100%;margin-bottom:3px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

.add-section{border:2px solid #1D9E75;border-radius:12px;padding:1rem;margin-bottom:1.25rem;background:#E1F5EE}
.add-section-label{font-size:11px;font-weight:500;color:#0F6E56;margin-bottom:8px;display:flex;align-items:center;gap:5px}
.add-section-label i{font-size:14px}
.add-main-row{display:flex;gap:8px;margin-bottom:8px}
.add-main-row input{flex:1;font-size:14px;padding:9px 12px;border-radius:8px;border:0.5px solid #9FE1CB;background:#fff;color:#2C2C2A}
.add-main-row input:focus{outline:none;border-color:#1D9E75}
.btn-add{background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px}
.btn-add:hover{background:#0F6E56}
.add-meta{display:flex;gap:6px;flex-wrap:wrap}
.add-meta select,.add-meta input[type=date]{font-size:12px;padding:6px 8px;border-radius:7px;border:0.5px solid #9FE1CB;background:#fff;color:#2C2C2A;height:32px}

.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.fb{font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.fb:hover{border-color:#1D9E75;color:#0F6E56}
.fb.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.fb .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

.task-list{display:flex;flex-direction:column;gap:6px}

.task-card{border-radius:10px;overflow:hidden;transition:opacity .15s}
.task-card:hover{opacity:.92}
.task-card.done{opacity:.5}
.pri-urgent .task-bar{background:#E24B4A}
.pri-high   .task-bar{background:#EF9F27}
.pri-normal .task-bar{background:#1D9E75}
.pri-low    .task-bar{background:#378ADD}
.task-bar{height:4px;width:100%}
.pri-urgent .task-card-inner{background:#FCEBEB;border:0.5px solid #F09595}
.pri-high   .task-card-inner{background:#FAEEDA;border:0.5px solid #FAC775}
.pri-normal .task-card-inner{background:#E1F5EE;border:0.5px solid #9FE1CB}
.pri-low    .task-card-inner{background:#E6F1FB;border:0.5px solid #B5D4F4}
.task-card-inner{display:flex;align-items:flex-start;gap:10px;padding:10px 12px}

.cb{width:20px;height:20px;border-radius:50%;border:1.5px solid;cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.pri-urgent .cb{border-color:#E24B4A}
.pri-high   .cb{border-color:#EF9F27}
.pri-normal .cb{border-color:#1D9E75}
.pri-low    .cb{border-color:#378ADD}
.cb.on{background:#1D9E75;border-color:#1D9E75}
.cb.on::after{content:'';width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(40deg);margin-top:-2px}

.task-body{flex:1;min-width:0}
.task-title-row{margin-bottom:5px}
.task-title{font-size:14px;font-weight:500;color:var(--color-text-primary);cursor:pointer;line-height:1.4;display:block}
.task-title.striked{text-decoration:line-through;color:var(--color-text-secondary)}
.title-edit{font-size:14px;font-weight:500;width:100%;border:none;border-bottom:1.5px solid #1D9E75;background:transparent;color:var(--color-text-primary);outline:none;padding:0 2px}

.task-badges{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 7px;border-radius:8px;font-weight:500;cursor:pointer;border:0.5px solid transparent;transition:opacity .15s}
.badge:hover{opacity:.75}
.b-urgent{background:#F7C1C1;color:#501313;border-color:#E24B4A}
.b-high{background:#FAC775;color:#412402;border-color:#BA7517}
.b-normal{background:#9FE1CB;color:#04342C;border-color:#1D9E75}
.b-low{background:#B5D4F4;color:#042C53;border-color:#378ADD}
.b-todo{background:rgba(0,0,0,.07);color:var(--color-text-secondary)}
.b-doing{background:#B5D4F4;color:#042C53;border-color:#378ADD}
.b-review{background:#FAC775;color:#412402;border-color:#BA7517}
.b-done{background:#9FE1CB;color:#04342C;border-color:#1D9E75}
.b-date{background:rgba(0,0,0,.06);color:var(--color-text-secondary);display:flex;align-items:center;gap:3px}
.b-date.overdue{background:#F7C1C1;color:#501313;border-color:#E24B4A}
.b-date.soon{background:#FAC775;color:#412402;border-color:#BA7517}

.task-actions{display:flex;gap:2px;flex-shrink:0}
.act{width:28px;height:28px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary);font-size:14px;transition:all .15s}
.act:hover{background:rgba(0,0,0,.08);color:var(--color-text-primary)}
.act.del{color:#E24B4A}
.act.del:hover{background:#F7C1C1;color:#501313}

.edit-panel{padding:10px 12px;border-top:0.5px solid rgba(0,0,0,.1)}
.edit-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.edit-row label{font-size:11px;color:var(--color-text-secondary)}
.edit-row select,.edit-row input[type=date]{font-size:12px;padding:4px 8px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary)}
.btn-sv{font-size:12px;padding:4px 12px;border-radius:6px;background:#1D9E75;color:#fff;border:none;cursor:pointer}
.btn-cn{font-size:12px;padding:4px 10px;border-radius:6px;background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary);cursor:pointer}

.empty{text-align:center;padding:3rem 1rem;color:var(--color-text-secondary);font-size:13px}
.empty i{font-size:28px;margin-bottom:8px;display:block;opacity:.4}

.trash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.trash-header span{font-size:13px;color:var(--color-text-secondary)}
.btn-empty-trash{font-size:12px;padding:5px 12px;border-radius:7px;border:0.5px solid #E24B4A;color:#A32D2D;background:transparent;cursor:pointer}
.btn-empty-trash:hover{background:#FCEBEB}

.trash-card{border-radius:10px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.trash-title{flex:1;font-size:13px;color:var(--color-text-secondary);text-decoration:line-through}
.btn-restore{font-size:11px;padding:3px 10px;border-radius:6px;border:0.5px solid #1D9E75;color:#0F6E56;background:transparent;cursor:pointer}
.btn-restore:hover{background:#E1F5EE}
.btn-perm-del{font-size:11px;padding:3px 8px;border-radius:6px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);background:transparent;cursor:pointer}
.btn-perm-del:hover{background:#FCEBEB;color:#A32D2D;border-color:#E24B4A}

.memo-ta{width:100%;min-height:180px;font-size:14px;line-height:1.8;border:0.5px solid var(--color-border-secondary);border-radius:10px;padding:12px 14px;resize:vertical;color:var(--color-text-primary);background:var(--color-background-primary);font-family:inherit}
.memo-ta:focus{outline:none;border-color:#1D9E75}
.memo-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.memo-hint{font-size:11px;color:var(--color-text-secondary)}
.memo-saved{font-size:11px;color:#0F6E56}
.btn-clear{font-size:11px;padding:4px 10px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer}
.btn-clear:hover{color:#A32D2D;border-color:#E24B4A;background:#FCEBEB}

.all-task-list{display:flex;flex-direction:column;gap:6px}
.all-group{margin-bottom:1.25rem}
.all-group-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;padding:4px 8px;background:var(--color-background-secondary);border-radius:6px;display:inline-block}

.notif{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:8px;padding:8px 16px;font-size:12px;font-weight:500;white-space:nowrap;color:var(--color-text-primary);opacity:0;transition:opacity .3s;pointer-events:none;display:flex;align-items:center;gap:6px;z-index:100}
.notif.show{opacity:1}

@media(max-width:480px){
  .add-meta{flex-direction:column}
  .add-meta select,.add-meta input[type=date]{width:100%}
  .btn-add{width:100%;justify-content:center}
  .tab-btn{padding:8px 12px;font-size:12px}
}
</style>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden">ADHD対応タスク管理アプリ</h2>

<div class="app" style="position:relative">

  <div style="display:flex;align-items:center;justify-content:space-between;padding-top:1rem;margin-bottom:0">
    <div style="display:flex;align-items:center;gap:8px">
      <i class="ti ti-checkbox" aria-hidden="true" style="font-size:20px;color:#1D9E75"></i>
      <span style="font-size:18px;font-weight:500;color:var(--color-text-primary)">タスク管理</span>
    </div>
    <span style="font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:3px 8px" id="today-lbl"></span>
  </div>

  <div class="tab-bar" role="tablist">
    <button class="tab-btn active" data-tab="today" role="tab" aria-selected="true"><i class="ti ti-calendar-due" aria-hidden="true"></i>今日のタスク</button>
    <button class="tab-btn" data-tab="all" role="tab" aria-selected="false"><i class="ti ti-list" aria-hidden="true"></i>全タスク</button>
    <button class="tab-btn" data-tab="memo" role="tab" aria-selected="false"><i class="ti ti-writing" aria-hidden="true"></i>ホワイトボード</button>
    <button class="tab-btn" data-tab="trash" role="tab" aria-selected="false"><i class="ti ti-trash" aria-hidden="true"></i>ゴミ箱 <span id="trash-count" style="font-size:10px;background:#F7C1C1;color:#501313;border-radius:8px;padding:1px 5px;display:none"></span></button>
  </div>

  <div class="tab-pane active" id="tab-today">
    <div class="prog-row">
      <span class="prog-label"><i class="ti ti-trophy" aria-hidden="true" style="font-size:13px;vertical-align:-2px;margin-right:3px;color:#BA7517"></i>達成率</span>
      <div class="prog-bar"><div class="prog-fill" id="prog" style="width:0%"></div></div>
      <span class="prog-num" id="prog-txt">0 / 0</span>
    </div>
    <div class="color-legend">
      <div class="legend-title">優先度の色分け　※日付が近い順 → 同日は優先度順 → 作成順 で自動並び替え</div>
      <div class="legend-item"><div class="legend-dot" style="background:#E24B4A"></div>最重要（赤）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>高（黄）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>普通（緑）</div>
      <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>低（青）</div>
    </div>
    <div class="add-section">
      <div class="add-section-label"><i class="ti ti-plus-circle" aria-hidden="true"></i>新しいタスクを追加</div>
      <div class="add-main-row">
        <input type="text" id="task-inp" placeholder="タスクを入力してください..." aria-label="タスク入力" />
        <button class="btn-add" id="add-btn"><i class="ti ti-plus" aria-hidden="true"></i>追加</button>
      </div>
      <div class="add-meta">
        <input type="date" id="t-date" aria-label="期限" />
        <select id="t-pri" aria-label="優先度">
          <option value="urgent">最重要（赤）</option>
          <option value="high">高（黄）</option>
          <option value="normal" selected>普通（緑）</option>
          <option value="low">低（青）</option>
        </select>
        <select id="t-status" aria-label="ステータス">
          <option value="todo">未着手</option>
          <option value="doing">進行中</option>
          <option value="review">確認待ち</option>
          <option value="done">完了</option>
        </select>
      </div>
    </div>
    <div class="filters" role="group">
      <button class="fb active" data-f="all">すべて</button>
      <button class="fb" data-f="todo"><span class="dot"></span>未着手</button>
      <button class="fb" data-f="doing"><span class="dot" style="background:#185FA5"></span>進行中</button>
      <button class="fb" data-f="review"><span class="dot" style="background:#BA7517"></span>確認待ち</button>
      <button class="fb" data-f="done"><span class="dot" style="background:#1D9E75"></span>完了</button>
      <button class="fb" data-f="overdue"><span class="dot" style="background:#A32D2D"></span>期限切れ</button>
    </div>
    <div class="task-list" id="task-list" aria-live="polite"></div>
  </div>

  <div class="tab-pane" id="tab-all">
    <div style="margin-bottom:1rem;font-size:13px;color:var(--color-text-secondary)">全タスクを優先度・日付順で表示しています</div>
    <div id="all-task-list"></div>
  </div>

  <div class="tab-pane" id="tab-memo">
    <div style="margin-bottom:10px;font-size:13px;color:var(--color-text-secondary)">アイデアや走り書きを自由にメモできます。⌘+Enter で保存されます。</div>
    <textarea class="memo-ta" id="memo-ta" placeholder="アイデアやその場限りのメモを書いてください&#10;&#10;例）&#10;来週の会議でA案を提案する&#10;新しいプロジェクトのアイデア：..." aria-label="ホワイトボード"></textarea>
    <div class="memo-footer">
      <span class="memo-hint">⌘+Enter で保存 / 自動保存あり</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="memo-saved" id="memo-saved-lbl"></span>
        <button class="btn-clear" id="clear-memo-btn"><i class="ti ti-trash" aria-hidden="true" style="font-size:12px"></i> クリア</button>
      </div>
    </div>
  </div>

  <div class="tab-pane" id="tab-trash">
    <div class="trash-header">
      <span id="trash-info">削除したタスクを復元できます</span>
      <button class="btn-empty-trash" id="empty-trash-btn"><i class="ti ti-trash" aria-hidden="true" style="font-size:12px"></i> 全て完全削除</button>
    </div>
    <div id="trash-list"></div>
  </div>

  <div class="notif" id="notif" role="alert"></div>
</div>

<script>
const SK='adhd_v6';const MK='adhd_wb_v2';const TK='adhd_trash_v1';
let tasks=[];let trash=[];let filter='all';let editId=null;

function td(){return new Date().toISOString().split('T')[0]}
function save(){try{localStorage.setItem(SK,JSON.stringify(tasks))}catch(e){}}
function saveTrash(){try{localStorage.setItem(TK,JSON.stringify(trash))}catch(e){}}
function load(){
  try{const s=localStorage.getItem(SK);if(s)tasks=JSON.parse(s)}catch(e){}
  try{const t=localStorage.getItem(TK);if(t)trash=JSON.parse(t)}catch(e){}
}
function saveMemo(){try{localStorage.setItem(MK,document.getElementById('memo-ta').value)}catch(e){}}
function loadMemo(){try{const m=localStorage.getItem(MK);if(m)document.getElementById('memo-ta').value=m}catch(e){}}

function notify(msg,color){
  const el=document.getElementById('notif');
  el.innerHTML='<i class="ti ti-check" aria-hidden="true" style="font-size:14px;color:'+(color||'#1D9E75')+'"></i>'+esc(msg);
  el.classList.add('show');clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2000);
}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function priLabel(p){return{urgent:'最重要',high:'高',normal:'普通',low:'低'}[p]||'普通'}
function stLabel(s){return{todo:'未着手',doing:'進行中',review:'確認待ち',done:'完了'}[s]||'未着手'}
function stCls(s){return{todo:'b-todo',doing:'b-doing',review:'b-review',done:'b-done'}[s]||'b-todo'}
function priCls(p){return{urgent:'b-urgent',high:'b-high',normal:'b-normal',low:'b-low'}[p]||'b-normal'}

function dateInfo(d){
  if(!d)return null;
  const dt=new Date(d+'T00:00:00');const now=new Date(td()+'T00:00:00');
  const diff=Math.round((dt-now)/864e5);
  const m=dt.getMonth()+1,day=dt.getDate();
  let cls='b-date',txt=m+'/'+day;
  if(diff<0){cls='b-date overdue';txt='期限切れ '+m+'/'+day}
  else if(diff===0){cls='b-date soon';txt='今日'}
  else if(diff===1){cls='b-date soon';txt='明日'}
  else if(diff<=3){cls='b-date soon';txt=m+'/'+day+'('+diff+'日後)'}
  return{cls,txt,diff};
}

const priOrd={urgent:0,high:1,normal:2,low:3};

function sortTasks(arr){
  return[...arr].sort((a,b)=>{
    if(a.status==='done'&&b.status!=='done')return 1;
    if(b.status==='done'&&a.status!=='done')return -1;
    const aD=a.date?Math.round((new Date(a.date+'T00:00:00')-new Date(td()+'T00:00:00'))/864e5):null;
    const bD=b.date?Math.round((new Date(b.date+'T00:00:00')-new Date(td()+'T00:00:00'))/864e5):null;
    const aOv=aD!==null&&aD<0,bOv=bD!==null&&bD<0;
    if(aOv&&!bOv)return -1;
    if(!aOv&&bOv)return 1;
    if(aOv&&bOv){
      const pd=(priOrd[a.priority]||2)-(priOrd[b.priority]||2);
      return pd!==0?pd:(a.created<b.created?-1:1);
    }
    if(aD!==null&&bD!==null){
      if(aD!==bD)return aD-bD;
      const pd=(priOrd[a.priority]||2)-(priOrd[b.priority]||2);
      return pd!==0?pd:(a.created<b.created?-1:1);
    }
    if(aD!==null&&bD===null)return -1;
    if(aD===null&&bD!==null)return 1;
    const pd=(priOrd[a.priority]||2)-(priOrd[b.priority]||2);
    return pd!==0?pd:(a.created<b.created?-1:1);
  });
}

function isOverdue(t){return t.date&&t.status!=='done'&&t.date<td()}

function filtered(){
  if(filter==='all')return tasks;
  if(filter==='overdue')return tasks.filter(isOverdue);
  return tasks.filter(t=>t.status===filter);
}

function updateProg(){
  const total=tasks.length,done=tasks.filter(t=>t.status==='done').length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=done+' / '+total;
}

function updateTrashBadge(){
  const el=document.getElementById('trash-count');
  if(trash.length>0){el.textContent=trash.length;el.style.display='inline'}
  else{el.style.display='none'}
}

function taskCardHTML(t,showEditPanel){
  const di=t.date?dateInfo(t.date):null;
  const isEd=showEditPanel;
  return`<div class="task-card pri-${t.priority}${t.status==='done'?' done':''}" data-id="${t.id}">
  <div class="task-bar"></div>
  <div class="task-card-inner">
    <div class="cb${t.status==='done'?' on':''}" role="checkbox" aria-checked="${t.status==='done'}" tabindex="0"
      onclick="toggleDone('${t.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleDone('${t.id}')}"></div>
    <div class="task-body">
      <div class="task-title-row">
        ${isEd
          ?`<input class="title-edit" id="tedit-${t.id}" value="${esc(t.title)}" onkeydown="titleKey(event,'${t.id}')" aria-label="タスク名を編集">`
          :`<span class="task-title${t.status==='done'?' striked':''}" onclick="startEdit('${t.id}')" title="クリックして編集">${esc(t.title)}</span>`}
      </div>
      <div class="task-badges">
        <span class="badge ${priCls(t.priority)}" onclick="cyclePri('${t.id}')" role="button" tabindex="0" title="クリックで優先度変更" onkeydown="if(event.key==='Enter')cyclePri('${t.id}')">${priLabel(t.priority)}</span>
        <span class="badge ${stCls(t.status)}" onclick="cycleSt('${t.id}')" role="button" tabindex="0" title="クリックでステータス変更" onkeydown="if(event.key==='Enter')cycleSt('${t.id}')">${stLabel(t.status)}</span>
        ${di?`<span class="badge ${di.cls}"><i class="ti ti-calendar" aria-hidden="true" style="font-size:11px"></i>${di.txt}</span>`:''}
      </div>
    </div>
    <div class="task-actions">
      <button class="act" onclick="startEdit('${t.id}')" aria-label="編集" title="編集"><i class="ti ti-pencil" aria-hidden="true"></i></button>
      <button class="act del" onclick="moveToTrash('${t.id}')" aria-label="ゴミ箱へ" title="ゴミ箱へ移動"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>
  </div>
  ${isEd?`<div class="edit-panel">
    <div class="edit-row">
      <label>優先度</label>
      <select id="epri-${t.id}">
        <option value="urgent"${t.priority==='urgent'?' selected':''}>最重要（赤）</option>
        <option value="high"${t.priority==='high'?' selected':''}>高（黄）</option>
        <option value="normal"${t.priority==='normal'?' selected':''}>普通（緑）</option>
        <option value="low"${t.priority==='low'?' selected':''}>低（青）</option>
      </select>
      <label>ステータス</label>
      <select id="est-${t.id}">
        <option value="todo"${t.status==='todo'?' selected':''}>未着手</option>
        <option value="doing"${t.status==='doing'?' selected':''}>進行中</option>
        <option value="review"${t.status==='review'?' selected':''}>確認待ち</option>
        <option value="done"${t.status==='done'?' selected':''}>完了</option>
      </select>
      <label>期限</label>
      <input type="date" id="edate-${t.id}" value="${t.date||''}">
      <button class="btn-sv" onclick="saveEdit('${t.id}')">保存</button>
      <button class="btn-cn" onclick="cancelEdit()">キャンセル</button>
    </div>
  </div>`:''}
</div>`;
}

function render(){
  updateProg();updateTrashBadge();
  const list=document.getElementById('task-list');
  const arr=sortTasks(filtered());
  if(!arr.length){
    list.innerHTML='<div class="empty"><i class="ti ti-mood-smile" aria-hidden="true"></i>'+(filter==='all'?'タスクなし！':'該当するタスクはありません')+'</div>';
  }else{
    list.innerHTML=arr.map(t=>taskCardHTML(t,editId===t.id)).join('');
  }
  if(editId){const el=document.getElementById('tedit-'+editId);if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length)}}
  renderAll();renderTrash();
}

function renderAll(){
  const list=document.getElementById('all-task-list');
  if(!tasks.length){list.innerHTML='<div class="empty"><i class="ti ti-list" aria-hidden="true"></i>タスクなし</div>';return}
  const sorted=sortTasks(tasks);
  const groups={overdue:[],today:[],soon:[],future:[],nodate:[]};
  sorted.forEach(t=>{
    if(!t.date){groups.nodate.push(t);return}
    const diff=Math.round((new Date(t.date+'T00:00:00')-new Date(td()+'T00:00:00'))/864e5);
    if(diff<0)groups.overdue.push(t);
    else if(diff===0)groups.today.push(t);
    else if(diff<=3)groups.soon.push(t);
    else groups.future.push(t);
  });
  const labels={overdue:'期限切れ',today:'今日',soon:'明日〜3日以内',future:'4日以降',nodate:'日付なし'};
  let html='';
  ['overdue','today','soon','future','nodate'].forEach(k=>{
    if(!groups[k].length)return;
    html+=`<div class="all-group"><div class="all-group-label">${labels[k]}（${groups[k].length}件）</div>`;
    html+=groups[k].map(t=>taskCardHTML(t,editId===t.id)).join('');
    html+='</div>';
  });
  list.innerHTML=html;
}

function renderTrash(){
  updateTrashBadge();
  const list=document.getElementById('trash-list');
  const info=document.getElementById('trash-info');
  if(!trash.length){
    list.innerHTML='<div class="empty"><i class="ti ti-trash" aria-hidden="true"></i>ゴミ箱は空です</div>';
    info.textContent='削除したタスクをここで復元できます';
    return;
  }
  info.textContent=trash.length+'件のタスクがゴミ箱にあります';
  list.innerHTML=trash.map(t=>`
    <div class="trash-card">
      <span class="trash-title">${esc(t.title)}</span>
      <button class="btn-restore" onclick="restore('${t.id}')"><i class="ti ti-arrow-back-up" aria-hidden="true" style="font-size:12px"></i> 復元</button>
      <button class="btn-perm-del" onclick="permDelete('${t.id}')"><i class="ti ti-x" aria-hidden="true" style="font-size:12px"></i></button>
    </div>`).join('');
}

function addTask(){
  const inp=document.getElementById('task-inp');
  const title=inp.value.trim();if(!title)return;
  tasks.push({
    id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    title,date:document.getElementById('t-date').value||'',
    priority:document.getElementById('t-pri').value,
    status:document.getElementById('t-status').value,
    created:new Date().toISOString()
  });
  save();render();inp.value='';inp.focus();notify('タスクを追加しました');
}

function toggleDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.status=t.status==='done'?'todo':'done';
  save();render();
  if(t.status==='done')notify('完了！お疲れさまでした','#1D9E75');
}
function cyclePri(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const c=['urgent','high','normal','low'];
  t.priority=c[(c.indexOf(t.priority)+1)%c.length];
  save();render();notify('優先度：'+priLabel(t.priority));
}
function cycleSt(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const c=['todo','doing','review','done'];
  t.status=c[(c.indexOf(t.status)+1)%c.length];
  save();render();notify(stLabel(t.status)+'に変更');
}
function moveToTrash(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  trash.unshift({...t,deletedAt:new Date().toISOString()});
  tasks=tasks.filter(x=>x.id!==id);
  save();saveTrash();render();notify('ゴミ箱へ移動しました','#BA7517');
}
function restore(id){
  const t=trash.find(x=>x.id===id);if(!t)return;
  const{deletedAt,...task}=t;
  tasks.unshift(task);trash=trash.filter(x=>x.id!==id);
  save();saveTrash();render();notify('タスクを復元しました','#1D9E75');
}
function permDelete(id){
  trash=trash.filter(x=>x.id!==id);saveTrash();renderTrash();notify('完全に削除しました','#A32D2D');
}

function startEdit(id){editId=id;render()}
function cancelEdit(){editId=null;render()}
function saveEdit(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const inp=document.getElementById('tedit-'+id);if(inp&&inp.value.trim())t.title=inp.value.trim();
  const ps=document.getElementById('epri-'+id);if(ps)t.priority=ps.value;
  const ss=document.getElementById('est-'+id);if(ss)t.status=ss.value;
  const ds=document.getElementById('edate-'+id);if(ds)t.date=ds.value;
  editId=null;save();render();notify('タスクを更新しました');
}
function titleKey(e,id){
  if(e.key==='Enter'){e.preventDefault();saveEdit(id)}
  if(e.key==='Escape'){cancelEdit()}
}

document.getElementById('add-btn').addEventListener('click',addTask);
document.getElementById('task-inp').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.isComposing){e.preventDefault();addTask()}
});

document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    filter=b.dataset.f;
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');render();
  });
});

document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>{x.classList.remove('active');x.setAttribute('aria-selected','false')});
    document.querySelectorAll('.tab-pane').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');b.setAttribute('aria-selected','true');
    document.getElementById('tab-'+b.dataset.tab).classList.add('active');
    if(b.dataset.tab==='all')renderAll();
    if(b.dataset.tab==='trash')renderTrash();
  });
});

document.getElementById('memo-ta').addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){
    e.preventDefault();saveMemo();
    const lbl=document.getElementById('memo-saved-lbl');
    lbl.textContent='保存しました';setTimeout(()=>lbl.textContent='',2000);
  }
});
document.getElementById('memo-ta').addEventListener('input',saveMemo);
document.getElementById('clear-memo-btn').addEventListener('click',()=>{
  if(confirm('ホワイトボードをクリアしますか？')){
    document.getElementById('memo-ta').value='';saveMemo();notify('クリアしました','#BA7517');
  }
});
document.getElementById('empty-trash-btn').addEventListener('click',()=>{
  if(!trash.length)return;
  if(confirm('ゴミ箱を完全に空にしますか？この操作は元に戻せません。')){
    trash=[];saveTrash();renderTrash();notify('ゴミ箱を空にしました','#A32D2D');
  }
});

const d=new Date();
document.getElementById('today-lbl').textContent=
  d.getFullYear()+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getDate().toString().padStart(2,'0')+
  ' ('+['日','月','火','水','木','金','土'][d.getDay()]+')';
document.getElementById('t-date').value=td();
loadMemo();load();render();
</script>
