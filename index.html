<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗂️</text></svg>">
<text y='.9em' font-size='90'>🗂️</text></svg>">
<title>タスク管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root{
  --green:#1D9E75;--green2:#0F6E56;--green-lt:#E1F5EE;--green-bd:#9FE1CB;
  --red:#E24B4A;--red-lt:#FCEBEB;--red-bd:#F09595;
  --yellow:#EF9F27;--yellow-lt:#FAEEDA;--yellow-bd:#FAC775;
  --blue:#378ADD;--blue-lt:#E6F1FB;--blue-bd:#B5D4F4;
  --orange:#BA7517;
  --bg:#F5F5F2;--white:#fff;--border:#E8E6DF;--text:#2C2C2A;--muted:#888;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;font-size:15px;color:var(--text)}
.app{max-width:900px;margin:0 auto;background:var(--bg);min-height:100vh}

/* MODE */
body.pc-mode .app{display:flex;flex-direction:column;padding-bottom:0}
body.pc-mode .top-hdr{display:flex}
body.pc-mode .pc-tabs{display:flex}
body.pc-mode .btab{display:none}
body.pc-mode .pane{padding:20px 24px}
body.pc-mode .add-meta-grid{grid-template-columns:1fr 1fr 1fr}
body.sp-mode .app{padding-bottom:72px}
body.sp-mode .top-hdr{display:flex}
body.sp-mode .pc-tabs{display:none}
body.sp-mode .btab{display:flex}
body.sp-mode .pane{padding:14px 14px 0}

/* HEADER */
.top-hdr{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-title{display:flex;align-items:center;gap:8px;font-size:18px;font-weight:700;color:#1A1A18}
.hdr-title i{font-size:22px;color:var(--green)}
.hdr-date{font-size:12px;color:var(--muted);background:var(--bg);border-radius:6px;padding:4px 9px;border:1px solid var(--border)}
.mode-toggle{display:flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 5px}
.mode-btn{font-size:11px;font-weight:600;padding:4px 10px;border-radius:16px;border:none;cursor:pointer;background:transparent;color:var(--muted);display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.mode-btn i{font-size:14px}
.mode-btn.active{background:var(--green);color:#fff}

/* PC TABS */
.pc-tabs{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:57px;z-index:49}
.pc-tab{padding:12px 18px;font-size:13px;font-weight:600;color:var(--muted);background:transparent;border:none;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;display:inline-flex;align-items:center;gap:6px;transition:color .15s}
.pc-tab i{font-size:16px}
.pc-tab:hover{color:var(--text)}
.pc-tab.active{color:var(--green);border-bottom-color:var(--green)}
.pc-tab .pc-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;min-width:16px;text-align:center;display:none;line-height:1.4;margin-left:2px}
.pc-tab .pc-badge.show{display:inline-block}

/* SP BOTTOM TAB */
.btab{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:640px;background:var(--white);border-top:1px solid var(--border);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;gap:3px;font-size:10px;font-weight:500;color:var(--muted);background:none;border:none;cursor:pointer;position:relative;transition:color .15s;min-height:52px}
.tb i{font-size:24px}
.tb.active{color:var(--green)}
.sp-badge{position:absolute;top:5px;right:calc(50% - 20px);background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:8px;padding:1px 5px;min-width:16px;text-align:center;display:none;line-height:1.4}
.sp-badge.show{display:block}

/* PANES */
.pane{display:none}.pane.active{display:block}

/* PROGRESS */
.prog-card{background:var(--white);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.prog-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prog-top-label{font-size:12px;color:var(--muted);font-weight:500}
.prog-top-pct{font-size:15px;font-weight:700;color:var(--green)}
.prog-bar{height:10px;background:#EAE8E1;border-radius:5px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;background:var(--green);border-radius:5px;transition:width .4s}
.prog-sub{font-size:12px;color:var(--muted);text-align:right}

/* STATUS SUMMARY */
.ss-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.ss-item{background:var(--white);border-radius:var(--rs);padding:10px 4px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);border-top:3px solid transparent}
.ss-todo{border-top-color:#ccc}.ss-doing{border-top-color:var(--blue)}.ss-review{border-top-color:var(--orange)}.ss-fix{border-top-color:var(--red)}.ss-done{border-top-color:var(--green)}
.ss-num{font-size:20px;font-weight:700;line-height:1}
.ss-todo .ss-num{color:#999}.ss-doing .ss-num{color:var(--blue)}.ss-review .ss-num{color:var(--orange)}.ss-fix .ss-num{color:var(--red)}.ss-done .ss-num{color:var(--green)}
.ss-lbl{font-size:9px;color:var(--muted);margin-top:4px;font-weight:500}

/* ADD CARD */
.add-card{background:var(--white);border:2px solid var(--green);border-radius:var(--r);padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.add-card-lbl{font-size:12px;font-weight:700;color:var(--green2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.add-card-lbl i{font-size:16px}
.inp{width:100%;font-size:15px;padding:11px 12px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;appearance:none}
.inp:focus{border-color:var(--green);background:var(--white)}
.add-meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.sel{width:100%;font-size:13px;padding:9px 10px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--bg);color:var(--text);-webkit-appearance:none;appearance:none;outline:none}
.sel:focus{border-color:var(--green);background:var(--white)}
input[type=date].sel{font-size:13px}
.btn-add{width:100%;margin-top:10px;background:var(--green);color:#fff;border:none;border-radius:var(--rs);padding:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-add i{font-size:18px}
.btn-add:hover{background:var(--green2)}

/* FILTERS */
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fb{flex-shrink:0;font-size:12px;font-weight:500;padding:7px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .15s}
.fb:hover{border-color:var(--green);color:var(--green)}
.fb.active{background:var(--green);color:#fff;border-color:var(--green)}
.fdot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}

/* TASK LIST */
.task-list{display:flex;flex-direction:column;gap:8px}

/* TASK CARD */
.tc{border-radius:var(--r);overflow:visible;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:opacity .2s;position:relative}
.tc.done-card{opacity:.55}
.tbar{height:5px;border-radius:var(--r) var(--r) 0 0}
.pri-urgent .tbar{background:var(--red)}
.pri-high   .tbar{background:var(--yellow)}
.pri-normal .tbar{background:var(--green)}
.pri-low    .tbar{background:var(--blue)}
.pri-urgent .tbody{background:var(--red-lt);border:1px solid var(--red-bd);border-top:none;border-radius:0 0 var(--r) var(--r)}
.pri-high   .tbody{background:var(--yellow-lt);border:1px solid var(--yellow-bd);border-top:none;border-radius:0 0 var(--r) var(--r)}
.pri-normal .tbody{background:var(--green-lt);border:1px solid var(--green-bd);border-top:none;border-radius:0 0 var(--r) var(--r)}
.pri-low    .tbody{background:var(--blue-lt);border:1px solid var(--blue-bd);border-top:none;border-radius:0 0 var(--r) var(--r)}
.tc.editing .tbody{border-radius:0}
.tbody{padding:12px}
.trow{display:flex;align-items:flex-start;gap:10px}

/* CHECKBOX */
.cb{width:24px;height:24px;min-width:24px;border-radius:50%;border:2.5px solid;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px;flex-shrink:0}
.pri-urgent .cb{border-color:var(--red)}
.pri-high   .cb{border-color:var(--yellow)}
.pri-normal .cb{border-color:var(--green)}
.pri-low    .cb{border-color:var(--blue)}
.cb.on{background:var(--green);border-color:var(--green)}
.cb.on::after{content:'';width:5px;height:10px;border:2.5px solid #fff;border-top:none;border-left:none;transform:rotate(40deg);margin-top:-2px}

.twrap{flex:1;min-width:0}
.ttitle{font-size:14px;font-weight:500;color:#1A1A18;line-height:1.45;word-break:break-all;display:block;padding:1px 0}
.ttitle.struck{text-decoration:line-through;color:#bbb}

/* ===================== INLINE SELECT BADGES ===================== */
.tbadges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center}

/* Wrapper that shows styled badge on top of a hidden native select */
.bdg-wrap{position:relative;display:inline-flex;align-items:center}
.bdg-wrap select{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:16px;/* prevent iOS zoom */}
.bdg-label{font-size:11px;font-weight:600;padding:4px 9px;border-radius:6px;border:1px solid transparent;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:3px;line-height:1.3}
.bdg-label .chev{font-size:10px;opacity:.6}

/* Priority colors */
.bpri-urgent .bdg-label{background:#F7C1C1;color:#501313;border-color:var(--red)}
.bpri-high   .bdg-label{background:var(--yellow-bd);color:#412402;border-color:var(--yellow)}
.bpri-normal .bdg-label{background:var(--green-bd);color:#04342C;border-color:var(--green)}
.bpri-low    .bdg-label{background:var(--blue-bd);color:#042C53;border-color:var(--blue)}

/* Status colors */
.bst-todo   .bdg-label{background:rgba(0,0,0,.07);color:#555}
.bst-doing  .bdg-label{background:var(--blue-bd);color:#042C53;border-color:var(--blue)}
.bst-review .bdg-label{background:var(--yellow-bd);color:#412402;border-color:var(--yellow)}
.bst-fix    .bdg-label{background:#F7C1C1;color:#501313;border-color:var(--red)}
.bst-done   .bdg-label{background:var(--green-bd);color:#04342C;border-color:var(--green)}

/* Date badge — native date input hidden behind */
.date-wrap{position:relative;display:inline-flex;align-items:center}
.date-wrap input[type=date]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer;font-size:16px;}
.date-label{font-size:11px;font-weight:600;padding:4px 9px;border-radius:6px;border:1px solid transparent;white-space:nowrap;pointer-events:none;display:flex;align-items:center;gap:4px;line-height:1.3;background:rgba(0,0,0,.06);color:#666}
.date-label.overdue{background:#F7C1C1;color:#501313;border-color:var(--red)}
.date-label.soon{background:var(--yellow-bd);color:#412402;border-color:var(--yellow)}
.date-label i{font-size:11px}

/* DEL BTN */
.del-btn{width:34px;height:34px;min-width:34px;border-radius:var(--rs);border:none;background:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex-shrink:0}
.del-btn:hover{background:#A32D2D}
.del-btn:active{background:#8B1A1A}

.empty{text-align:center;padding:3rem 1rem;color:#bbb;font-size:13px}
.empty i{font-size:36px;margin-bottom:10px;display:block}

/* ALL TAB GROUPS */
.grp-lbl{font-size:11px;font-weight:700;color:var(--muted);margin:16px 0 6px;padding:4px 10px;background:#EAE8E1;border-radius:6px;display:inline-block;letter-spacing:.04em}

/* TRASH */
.trash-notice{background:var(--yellow-lt);border:1.5px solid var(--yellow-bd);border-radius:var(--rs);padding:11px 13px;font-size:12px;color:#633806;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.trash-notice i{font-size:17px;flex-shrink:0;margin-top:1px}
.trash-card{border-radius:var(--rs);background:var(--red-lt);border:1.5px solid var(--red-bd);padding:13px 12px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.trash-icon-wrap{width:36px;height:36px;min-width:36px;border-radius:var(--rs);background:var(--red);display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px}
.trash-title{flex:1;font-size:13px;color:#791F1F;text-decoration:line-through;word-break:break-all;line-height:1.4}
.btn-restore{font-size:12px;font-weight:600;padding:7px 11px;border-radius:var(--rs);border:1.5px solid var(--green);color:var(--green2);background:var(--white);cursor:pointer;white-space:nowrap;flex-shrink:0}
.btn-restore:hover{background:var(--green-lt)}
.btn-perm{width:34px;height:34px;min-width:34px;border-radius:var(--rs);border:none;background:#8B1A1A;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.btn-perm:hover{background:#6B0E0E}
.btn-empty{width:100%;margin-top:10px;padding:12px;border-radius:var(--rs);border:1.5px solid var(--red);color:var(--red);background:var(--white);font-size:14px;font-weight:600;cursor:pointer}
.btn-empty:hover{background:var(--red-lt)}

/* MEMO */
.memo-ta{width:100%;min-height:55vh;font-size:14px;line-height:1.85;border:1.5px solid var(--border);border-radius:var(--r);padding:14px;resize:vertical;color:var(--text);background:var(--white);font-family:inherit;outline:none;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.memo-ta:focus{border-color:var(--green)}
.memo-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-bottom:6px}
.memo-hint{font-size:11px;color:#bbb}
.memo-saved{font-size:11px;color:var(--green);font-weight:600}
.btn-clear{font-size:12px;padding:7px 12px;border-radius:var(--rs);border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer}
.btn-clear:hover{background:var(--red-lt);color:var(--red);border-color:var(--red)}


/* TASK MEMO */
.task-memo-wrap{margin-top:8px}
.task-memo-toggle{font-size:11px;font-weight:600;color:var(--muted);background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;padding:2px 0}
.task-memo-toggle:hover{color:var(--green)}
.task-memo-toggle i{font-size:13px}
.task-memo-area{display:none;margin-top:6px}
.task-memo-area.open{display:block}
.task-memo-ta{width:100%;font-size:12px;line-height:1.6;border:1px solid rgba(0,0,0,.15);border-radius:6px;padding:7px 9px;resize:none;background:rgba(255,255,255,.6);color:var(--text);font-family:inherit;outline:none;min-height:60px}
.task-memo-ta:focus{border-color:var(--green);background:#fff}
.task-memo-hint{font-size:10px;color:var(--muted);margin-top:3px;text-align:right}
.has-memo-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);display:inline-block;margin-left:3px;vertical-align:middle}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A18;color:#fff;border-radius:var(--rs);padding:9px 18px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;z-index:300;display:flex;align-items:center;gap:7px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{opacity:1}
body.pc-mode .toast{bottom:20px}

@media(max-width:400px){.ss-lbl{font-size:8px}.ss-num{font-size:17px}.hdr-title{font-size:16px}}
</style>
</head>
<body class="sp-mode">
<div class="app">

  <!-- HEADER -->
  <div class="top-hdr">
    <div class="hdr-left">
      <div class="hdr-title"><i class="ti ti-checkbox"></i>タスク管理</div>
      <span class="hdr-date" id="today-lbl"></span>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn" id="btn-pc" onclick="setMode('pc')"><i class="ti ti-device-laptop"></i>PC</button>
      <button class="mode-btn active" id="btn-sp" onclick="setMode('sp')"><i class="ti ti-device-mobile"></i>スマホ</button>
    </div>
  </div>

  <!-- PC TABS -->
  <div class="pc-tabs">
    <button class="pc-tab active" data-tab="today"><i class="ti ti-calendar-due"></i>今日のタスク</button>
    <button class="pc-tab" data-tab="all"><i class="ti ti-list"></i>全タスク</button>
    <button class="pc-tab" data-tab="memo"><i class="ti ti-writing"></i>ホワイトボード</button>
    <button class="pc-tab" data-tab="trash"><i class="ti ti-trash"></i>ゴミ箱<span class="pc-badge" id="pc-trash-badge"></span></button>
  </div>

  <!-- TODAY -->
  <div class="pane active" id="pane-today">
    <div class="prog-card">
      <div class="prog-top">
        <span class="prog-top-label"><i class="ti ti-calendar-due" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>今日のタスク達成率</span>
        <span class="prog-top-pct" id="prog-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-sub" id="prog-sub">0 / 0 完了</div>
    </div>
    <div class="add-card">
      <div class="add-card-lbl"><i class="ti ti-plus-circle"></i>新しいタスクを追加</div>
      <input class="inp" type="text" id="task-inp" placeholder="タスクを入力してください..." autocomplete="off"/>
      <div class="add-meta-grid">
        <input type="date" class="sel" id="t-date"/>
        <select class="sel" id="t-pri">
          <option value="urgent">🔴 最重要</option>
          <option value="high">🟡 高</option>
          <option value="normal" selected>🟢 普通</option>
          <option value="low">🔵 低</option>
        </select>
        <select class="sel" id="t-status">
          <option value="todo">未着手</option>
          <option value="doing">作業中</option>
          <option value="review">確認待ち</option>
          <option value="fix">修正中</option>
          <option value="done">完了</option>
        </select>
      </div>
      <button class="btn-add" id="add-btn"><i class="ti ti-plus"></i>追加する</button>
    </div>
    <div class="filters">
      <button class="fb active" data-f="all">すべて</button>
      <button class="fb" data-f="todo"><span class="fdot" style="background:#aaa"></span>未着手</button>
      <button class="fb" data-f="doing"><span class="fdot" style="background:var(--blue)"></span>作業中</button>
      <button class="fb" data-f="review"><span class="fdot" style="background:var(--orange)"></span>確認待ち</button>
      <button class="fb" data-f="fix"><span class="fdot" style="background:var(--red)"></span>修正中</button>
      <button class="fb" data-f="done"><span class="fdot" style="background:var(--green)"></span>完了</button>
      <button class="fb" data-f="overdue"><span class="fdot" style="background:#A32D2D"></span>期限切れ</button>
    </div>
    <div class="task-list" id="task-list"></div>
    <div style="height:16px"></div>
  </div>

  <!-- ALL -->
  <div class="pane" id="pane-all">
    <div class="prog-card">
      <div class="prog-top">
        <span class="prog-top-label"><i class="ti ti-list" style="font-size:14px;vertical-align:-2px;margin-right:4px"></i>全タスク達成率</span>
        <span class="prog-top-pct" id="all-pct">0%</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="all-fill" style="width:0%"></div></div>
      <div class="prog-sub" id="all-sub">0 / 0 完了</div>
    </div>
    <div class="ss-grid">
      <div class="ss-item ss-todo"><div class="ss-num" id="sc-todo">0</div><div class="ss-lbl">未着手</div></div>
      <div class="ss-item ss-doing"><div class="ss-num" id="sc-doing">0</div><div class="ss-lbl">作業中</div></div>
      <div class="ss-item ss-review"><div class="ss-num" id="sc-review">0</div><div class="ss-lbl">確認待ち</div></div>
      <div class="ss-item ss-fix"><div class="ss-num" id="sc-fix">0</div><div class="ss-lbl">修正中</div></div>
      <div class="ss-item ss-done"><div class="ss-num" id="sc-done">0</div><div class="ss-lbl">完了</div></div>
    </div>
    <div id="all-list"></div>
    <div style="height:16px"></div>
  </div>

  <!-- MEMO -->
  <div class="pane" id="pane-memo">
    <textarea class="memo-ta" id="memo-ta" placeholder="アイデアや走り書きを自由にメモできます&#10;&#10;例）&#10;来週の会議でA案を提案する&#10;新しいプロジェクトのアイデア..."></textarea>
    <div class="memo-footer">
      <span class="memo-hint">⌘+Enter で保存 / 自動保存あり</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="memo-saved" id="memo-saved"></span>
        <button class="btn-clear" id="clear-memo">クリア</button>
      </div>
    </div>
  </div>

  <!-- TRASH -->
  <div class="pane" id="pane-trash">
    <div class="trash-notice"><i class="ti ti-alert-triangle"></i>ゴミ箱のタスクは「復元」で戻せます。「×」は完全削除で元に戻せません。</div>
    <div id="trash-list"></div>
    <button class="btn-empty" id="empty-trash"><i class="ti ti-trash" style="font-size:15px;vertical-align:-2px;margin-right:5px"></i>ゴミ箱を全て完全削除</button>
    <div style="height:16px"></div>
  </div>
</div>

<!-- SP BOTTOM TAB -->
<div class="btab">
  <button class="tb active" data-tab="today"><i class="ti ti-calendar-due"></i>今日</button>
  <button class="tb" data-tab="all"><i class="ti ti-list"></i>全タスク</button>
  <button class="tb" data-tab="memo"><i class="ti ti-writing"></i>メモ</button>
  <button class="tb" data-tab="trash"><i class="ti ti-trash"></i>ゴミ箱<span class="sp-badge" id="sp-trash-badge"></span></button>
</div>

<div class="toast" id="toast"></div>

<script>
const SK='adhd_fin3',MK='adhd_wb_fin3',TK='adhd_tr_fin3',ModeK='adhd_mode2';
let tasks=[],trash=[],filter='all';

const priOrd={urgent:0,high:1,normal:2,low:3};
const priLabel=p=>({urgent:'最重要',high:'高',normal:'普通',low:'低'}[p]||'普通');
const stLabel=s=>({todo:'未着手',doing:'作業中',review:'確認待ち',fix:'修正中',done:'完了'}[s]||'未着手');
const priWrapCls=p=>({urgent:'bpri-urgent',high:'bpri-high',normal:'bpri-normal',low:'bpri-low'}[p]||'bpri-normal');
const stWrapCls=s=>({todo:'bst-todo',doing:'bst-doing',review:'bst-review',fix:'bst-fix',done:'bst-done'}[s]||'bst-todo');
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const td=()=>new Date().toISOString().split('T')[0];

/* MODE */
function setMode(m){
  document.body.className=m+'-mode';
  document.getElementById('btn-pc').classList.toggle('active',m==='pc');
  document.getElementById('btn-sp').classList.toggle('active',m==='sp');
  try{localStorage.setItem(ModeK,m)}catch(e){}
}
function loadMode(){
  try{
    const saved=localStorage.getItem(ModeK);
    setMode(saved||(window.innerWidth>=768?'pc':'sp'));
  }catch(e){setMode('sp')}
}

/* STORAGE */
function save(){try{localStorage.setItem(SK,JSON.stringify(tasks))}catch(e){}}
function saveTrash(){try{localStorage.setItem(TK,JSON.stringify(trash))}catch(e){}}
function load(){
  try{const s=localStorage.getItem(SK);if(s)tasks=JSON.parse(s)}catch(e){}
  try{const t=localStorage.getItem(TK);if(t)trash=JSON.parse(t)}catch(e){}
}
function saveMemo(){try{localStorage.setItem(MK,document.getElementById('memo-ta').value)}catch(e){}}
function loadMemo(){try{const m=localStorage.getItem(MK);if(m)document.getElementById('memo-ta').value=m}catch(e){}}

function toast(msg){
  const el=document.getElementById('toast');
  el.innerHTML='<i class="ti ti-check" style="color:var(--green-bd);font-size:16px"></i>'+esc(msg);
  el.classList.add('show');clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2000);
}

function dateInfo(d){
  if(!d)return null;
  const dt=new Date(d+'T00:00:00'),now=new Date(td()+'T00:00:00');
  const diff=Math.round((dt-now)/864e5);
  const m=dt.getMonth()+1,day=dt.getDate();
  let cls='',txt=m+'/'+day;
  if(diff<0){cls='overdue';txt='期限切れ '+m+'/'+day}
  else if(diff===0){cls='soon';txt='今日'}
  else if(diff===1){cls='soon';txt='明日'}
  else if(diff<=3){cls='soon';txt=m+'/'+day+'('+diff+'日後)'}
  return{cls,txt,diff};
}

function sortArr(arr){
  return[...arr].sort((a,b)=>{
    if(a.status==='done'&&b.status!=='done')return 1;
    if(b.status==='done'&&a.status!=='done')return -1;
    const aD=a.date?Math.round((new Date(a.date+'T00:00:00')-new Date(td()+'T00:00:00'))/864e5):null;
    const bD=b.date?Math.round((new Date(b.date+'T00:00:00')-new Date(td()+'T00:00:00'))/864e5):null;
    const aOv=aD!==null&&aD<0,bOv=bD!==null&&bD<0;
    if(aOv&&!bOv)return -1;if(!aOv&&bOv)return 1;
    if(aOv&&bOv){const p=(priOrd[a.priority]||2)-(priOrd[b.priority]||2);return p||a.created.localeCompare(b.created)}
    if(aD!==null&&bD!==null){if(aD!==bD)return aD-bD;const p=(priOrd[a.priority]||2)-(priOrd[b.priority]||2);return p||a.created.localeCompare(b.created)}
    if(aD!==null)return -1;if(bD!==null)return 1;
    const p=(priOrd[a.priority]||2)-(priOrd[b.priority]||2);return p||a.created.localeCompare(b.created);
  });
}

function filtered(){
  if(filter==='all')return tasks;
  if(filter==='overdue')return tasks.filter(t=>t.date&&t.status!=='done'&&t.date<td());
  return tasks.filter(t=>t.status===filter);
}

/* CARD HTML — badges are native selects / date input overlaid */
function cardHTML(t){
  const di=t.date?dateInfo(t.date):null;
  const dateLabel=di?di.txt:'日付を設定';
  const dateCls=di?di.cls:'';

  return`<div class="tc${t.status==='done'?' done-card':''} pri-${t.priority}" data-id="${t.id}">
<div class="tbar"></div>
<div class="tbody">
  <div class="trow">
    <div class="cb${t.status==='done'?' on':''}"
      onclick="toggleDone('${t.id}')" role="checkbox" aria-checked="${t.status==='done'}" tabindex="0"
      onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleDone('${t.id}')}"></div>
    <div class="twrap">
      <span class="ttitle${t.status==='done'?' struck':''}">${esc(t.title)}</span>
      <div class="tbadges">

        <!-- 優先度プルダウン -->
        <div class="bdg-wrap ${priWrapCls(t.priority)}">
          <div class="bdg-label">
            ${priLabel(t.priority)}
            <i class="ti ti-chevron-down chev"></i>
          </div>
          <select onchange="changePri('${t.id}',this.value)" aria-label="優先度">
            <option value="urgent"${t.priority==='urgent'?' selected':''}>🔴 最重要</option>
            <option value="high"${t.priority==='high'?' selected':''}>🟡 高</option>
            <option value="normal"${t.priority==='normal'?' selected':''}>🟢 普通</option>
            <option value="low"${t.priority==='low'?' selected':''}>🔵 低</option>
          </select>
        </div>

        <!-- ステータスプルダウン -->
        <div class="bdg-wrap ${stWrapCls(t.status)}">
          <div class="bdg-label">
            ${stLabel(t.status)}
            <i class="ti ti-chevron-down chev"></i>
          </div>
          <select onchange="changeSt('${t.id}',this.value)" aria-label="ステータス">
            <option value="todo"${t.status==='todo'?' selected':''}>未着手</option>
            <option value="doing"${t.status==='doing'?' selected':''}>作業中</option>
            <option value="review"${t.status==='review'?' selected':''}>確認待ち</option>
            <option value="fix"${t.status==='fix'?' selected':''}>修正中</option>
            <option value="done"${t.status==='done'?' selected':''}>完了</option>
          </select>
        </div>

        <!-- 日付カレンダー -->
        <div class="date-wrap">
          <div class="date-label ${dateCls}">
            <i class="ti ti-calendar"></i>${dateLabel}
            <i class="ti ti-chevron-down chev" style="font-size:10px;opacity:.5"></i>
          </div>
          <input type="date" value="${t.date||''}" onchange="changeDate('${t.id}',this.value)" aria-label="期限日">
        </div>

      </div>
    </div>
    <button class="del-btn" onclick="moveTrash('${t.id}')" aria-label="ゴミ箱へ" title="ゴミ箱へ移動"><i class="ti ti-trash"></i></button>
  </div>
  <div class="task-memo-wrap">
    <button class="task-memo-toggle" onclick="toggleMemo('${t.id}')" id="memo-toggle-${t.id}">
      <i class="ti ti-notes"></i>メモ${t.memo?'<span class=\'has-memo-dot\'></span>':''}
    </button>
    <div class="task-memo-area" id="memo-area-${t.id}">
      <textarea class="task-memo-ta" id="memo-ta-${t.id}"
        placeholder="このタスクのメモを入力..."
        onblur="saveTaskMemo('${t.id}')"
        onkeydown="if((event.metaKey||event.ctrlKey)&&event.key==='Enter'){event.preventDefault();saveTaskMemo('${t.id}')}"
      >${esc(t.memo||'')}</textarea>
      <div class="task-memo-hint">⌘+Enter または フォーカスを外すと保存</div>
    </div>
  </div>
</div>
</div>`;
}

/* RENDER */
function render(){
  const total=tasks.length,done=tasks.filter(t=>t.status==='done').length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-sub').textContent=done+' / '+total+' 完了';
  const arr=sortArr(filtered());
  const list=document.getElementById('task-list');
  list.innerHTML=arr.length?arr.map(cardHTML).join('')
    :'<div class="empty"><i class="ti ti-mood-smile"></i>'+(filter==='all'?'タスクなし！':'該当するタスクなし')+'</div>';
  renderAll();updateBadge();
}

function renderAll(){
  const total=tasks.length,done=tasks.filter(t=>t.status==='done').length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('all-fill').style.width=pct+'%';
  document.getElementById('all-pct').textContent=pct+'%';
  document.getElementById('all-sub').textContent=done+' / '+total+' 完了';
  ['todo','doing','review','fix','done'].forEach(s=>{
    document.getElementById('sc-'+s).textContent=tasks.filter(t=>t.status===s).length;
  });
  const sorted=sortArr(tasks);
  const g={overdue:[],today:[],soon:[],future:[],nodate:[]};
  sorted.forEach(t=>{
    if(!t.date){g.nodate.push(t);return}
    const diff=Math.round((new Date(t.date+'T00:00:00')-new Date(td()+'T00:00:00'))/864e5);
    if(diff<0)g.overdue.push(t);
    else if(diff===0)g.today.push(t);
    else if(diff<=3)g.soon.push(t);
    else g.future.push(t);
  });
  const labels={overdue:'⚠ 期限切れ',today:'📅 今日',soon:'🔜 明日〜3日以内',future:'📆 4日以降',nodate:'📋 日付なし'};
  let html='';
  ['overdue','today','soon','future','nodate'].forEach(k=>{
    if(!g[k].length)return;
    html+=`<div class="grp-lbl">${labels[k]}（${g[k].length}件）</div>`;
    html+=g[k].map(cardHTML).join('');
  });
  document.getElementById('all-list').innerHTML=html||'<div class="empty"><i class="ti ti-list"></i>タスクなし</div>';
}

function renderTrash(){
  updateBadge();
  const list=document.getElementById('trash-list');
  if(!trash.length){list.innerHTML='<div class="empty"><i class="ti ti-trash"></i>ゴミ箱は空です</div>';return}
  list.innerHTML=trash.map(t=>`
    <div class="trash-card">
      <div class="trash-icon-wrap"><i class="ti ti-trash"></i></div>
      <span class="trash-title">${esc(t.title)}</span>
      <button class="btn-restore" onclick="restore('${t.id}')">復元</button>
      <button class="btn-perm" onclick="permDel('${t.id}')" aria-label="完全削除"><i class="ti ti-x"></i></button>
    </div>`).join('');
}

function updateBadge(){
  const n=trash.length;
  const pc=document.getElementById('pc-trash-badge');
  const sp=document.getElementById('sp-trash-badge');
  if(n){pc.textContent=n;pc.classList.add('show');sp.textContent=n;sp.classList.add('show')}
  else{pc.classList.remove('show');sp.classList.remove('show')}
}

/* ACTIONS */
function addTask(){
  const inp=document.getElementById('task-inp');
  const title=inp.value.trim();if(!title)return;
  tasks.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),title,
    date:document.getElementById('t-date').value||'',
    priority:document.getElementById('t-pri').value,
    status:document.getElementById('t-status').value,
    created:new Date().toISOString()});
  save();render();inp.value='';inp.focus();toast('タスクを追加しました');
}
function toggleDone(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.status=t.status==='done'?'todo':'done';
  save();render();if(t.status==='done')toast('完了！お疲れさまでした');
}
function changePri(id,val){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.priority=val;save();render();toast('優先度：'+priLabel(val));
}
function changeSt(id,val){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.status=val;save();render();toast(stLabel(val)+'に変更');
}
function changeDate(id,val){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.date=val;save();render();toast(val?'期限を設定しました':'期限を削除しました');
}
function moveTrash(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  trash.unshift({...t,deletedAt:new Date().toISOString()});
  tasks=tasks.filter(x=>x.id!==id);
  save();saveTrash();render();renderTrash();toast('ゴミ箱へ移動しました');
}
function restore(id){
  const t=trash.find(x=>x.id===id);if(!t)return;
  const{deletedAt,...task}=t;
  tasks.unshift(task);trash=trash.filter(x=>x.id!==id);
  save();saveTrash();render();renderTrash();toast('タスクを復元しました');
}

/* TASK MEMO */
function toggleMemo(id){
  const area=document.getElementById('memo-area-'+id);
  const ta=document.getElementById('memo-ta-'+id);
  if(!area)return;
  const isOpen=area.classList.contains('open');
  area.classList.toggle('open',!isOpen);
  if(!isOpen&&ta)setTimeout(()=>ta.focus(),50);
}
function saveTaskMemo(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  const ta=document.getElementById('memo-ta-'+id);if(!ta)return;
  const val=ta.value;
  if(t.memo===val)return;
  t.memo=val;
  save();
  // update toggle dot without full re-render
  const toggle=document.getElementById('memo-toggle-'+id);
  if(toggle){
    const dot=toggle.querySelector('.has-memo-dot');
    if(val&&!dot){
      const span=document.createElement('span');span.className='has-memo-dot';toggle.appendChild(span);
    }else if(!val&&dot){dot.remove()}
  }
  toast('メモを保存しました');
}

function permDel(id){trash=trash.filter(x=>x.id!==id);saveTrash();renderTrash();toast('完全に削除しました')}

/* TAB SWITCH */
function switchTab(tab){
  document.querySelectorAll('.pc-tab,.tb').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  document.getElementById('pane-'+tab).classList.add('active');
  if(tab==='trash')renderTrash();
  if(tab==='all')renderAll();
}
document.querySelectorAll('.pc-tab,.tb').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));

/* EVENTS */
document.getElementById('add-btn').addEventListener('click',addTask);
document.getElementById('task-inp').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.isComposing){e.preventDefault();addTask()}
});
document.querySelectorAll('.fb').forEach(b=>{
  b.addEventListener('click',()=>{
    filter=b.dataset.f;
    document.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');render();
  });
});
document.getElementById('memo-ta').addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'){
    e.preventDefault();saveMemo();
    const lbl=document.getElementById('memo-saved');
    lbl.textContent='保存しました';setTimeout(()=>lbl.textContent='',2000);
  }
});
document.getElementById('memo-ta').addEventListener('input',saveMemo);
document.getElementById('clear-memo').addEventListener('click',()=>{
  if(confirm('ホワイトボードをクリアしますか？')){
    document.getElementById('memo-ta').value='';saveMemo();toast('クリアしました');
  }
});
document.getElementById('empty-trash').addEventListener('click',()=>{
  if(!trash.length)return;
  if(confirm('ゴミ箱を完全に空にしますか？元に戻せません。')){
    trash=[];saveTrash();renderTrash();toast('ゴミ箱を空にしました');
  }
});

/* INIT */
const d=new Date();
document.getElementById('today-lbl').textContent=
  (d.getMonth()+1)+'/'+d.getDate()+' ('+['日','月','火','水','木','金','土'][d.getDay()]+')';
document.getElementById('t-date').value=td();
loadMemo();load();loadMode();render();renderTrash();
</script>
</body>
</html>
